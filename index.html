<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NovaMind — Твой AI-помощник</title>
  <meta name="description" content="NovaMind — умный AI-ассистент нового поколения. Отвечает на вопросы, анализирует изображения, генерирует картинки." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #09090b;
      --surface: #111113;
      --surface2: #18181b;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --accent: #a78bfa;
      --accent2: #7c3aed;
      --accent-glow: rgba(167,139,250,0.15);
      --text: #fafafa;
      --text-muted: #71717a;
      --text-dim: #3f3f46;
      --user-bg: linear-gradient(135deg, #7c3aed, #a855f7);
      --radius: 18px;
      --radius-sm: 10px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Animated background orbs */
    body::before {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(124,58,237,0.12) 0%, transparent 70%);
      top: -200px; right: -200px;
      pointer-events: none;
      animation: drift 12s ease-in-out infinite alternate;
    }
    body::after {
      content: '';
      position: fixed;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(167,139,250,0.08) 0%, transparent 70%);
      bottom: 100px; left: -100px;
      pointer-events: none;
      animation: drift 15s ease-in-out infinite alternate-reverse;
    }
    @keyframes drift { 0% { transform: translate(0,0); } 100% { transform: translate(30px, 20px); } }

    /* Header */
    header {
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      position: relative;
      z-index: 10;
      flex-shrink: 0;
    }

    .logo-mark {
      width: 34px; height: 34px;
      background: var(--user-bg);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 15px;
      letter-spacing: -0.5px;
      flex-shrink: 0;
      box-shadow: 0 0 20px rgba(124,58,237,0.4);
    }

    .brand {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fff 30%, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .status-pill {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
      background: rgba(167,139,250,0.08);
      border: 1px solid rgba(167,139,250,0.2);
      border-radius: 100px;
      padding: 4px 10px;
      font-size: 12px;
      color: var(--accent);
      font-weight: 500;
    }
    .status-dot {
      width: 6px; height: 6px;
      background: #4ade80;
      border-radius: 50%;
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Messages area */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 32px 0;
      display: flex;
      flex-direction: column;
      gap: 24px;
      position: relative;
      z-index: 1;
      scrollbar-width: thin;
      scrollbar-color: var(--surface2) transparent;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }

    .msg-row {
      display: flex;
      gap: 12px;
      padding: 0 24px;
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
      animation: fadeUp 0.3s ease-out both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 10px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Syne', sans-serif;
      margin-top: 2px;
    }
    .avatar.ai {
      background: var(--user-bg);
      box-shadow: 0 0 16px rgba(124,58,237,0.35);
      font-size: 13px;
    }
    .avatar.human {
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text-muted);
      font-size: 11px;
    }

    .bubble {
      max-width: calc(100% - 50px);
      padding: 12px 16px;
      border-radius: 4px;
      line-height: 1.65;
      font-size: 15px;
      font-weight: 300;
    }

    .msg-row.ai .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top-left-radius: var(--radius);
      border-top-right-radius: var(--radius);
      border-bottom-right-radius: var(--radius);
      color: var(--text);
    }

    .msg-row.user .bubble {
      background: var(--user-bg);
      border-top-left-radius: var(--radius);
      border-top-right-radius: var(--radius);
      border-bottom-left-radius: var(--radius);
      color: #fff;
      font-weight: 400;
    }

    .bubble img {
      max-width: 100%;
      max-height: 300px;
      border-radius: 12px;
      display: block;
      margin-bottom: 8px;
    }

    /* Generated image in response */
    .gen-image-wrap {
      margin-top: 12px;
    }
    .gen-image-wrap img {
      max-width: 100%;
      border-radius: 12px;
      display: block;
      border: 1px solid var(--border2);
    }

    /* Typing indicator */
    .typing-bubble {
      display: flex; align-items: center; gap: 5px;
      padding: 14px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius) var(--radius) var(--radius) 4px;
      width: fit-content;
    }
    .typing-dot {
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    /* Welcome screen */
    .welcome {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; flex: 1; text-align: center;
      padding: 40px 24px;
      animation: fadeUp 0.5s ease-out both;
    }
    .welcome-logo {
      width: 72px; height: 72px;
      background: var(--user-bg);
      border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 28px;
      margin-bottom: 20px;
      box-shadow: 0 0 40px rgba(124,58,237,0.4), 0 0 80px rgba(124,58,237,0.15);
    }
    .welcome h1 {
      font-family: 'Syne', sans-serif;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #fff 30%, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .welcome p {
      font-size: 16px;
      color: var(--text-muted);
      max-width: 420px;
      line-height: 1.6;
      font-weight: 300;
      margin-bottom: 32px;
    }
    .chips {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center;
      max-width: 500px;
    }
    .chip {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 100px;
      padding: 8px 16px;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 400;
    }
    .chip:hover {
      background: var(--surface2);
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-1px);
    }

    /* Input area */
    .input-shell {
      padding: 16px 24px 20px;
      position: relative;
      z-index: 10;
      flex-shrink: 0;
    }

    .input-box {
      max-width: 780px;
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
      overflow: hidden;
    }
    .input-box:focus-within {
      border-color: rgba(167,139,250,0.5);
      box-shadow: 0 0 0 3px rgba(167,139,250,0.08);
    }

    /* Image preview strip */
    #img-preview-strip {
      display: none;
      padding: 10px 14px 0;
      gap: 8px;
      align-items: flex-start;
    }
    #img-preview-strip.has-image { display: flex; }
    #img-preview-strip img {
      height: 60px;
      border-radius: 8px;
      border: 1px solid var(--border2);
    }
    #img-preview-strip .remove-img {
      background: rgba(0,0,0,0.6);
      border: none;
      color: #fff;
      width: 20px; height: 20px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 12px;
      display: flex; align-items: center; justify-content: center;
      margin-left: -14px; margin-top: -6px;
      flex-shrink: 0;
      z-index: 1;
    }

    .input-row {
      display: flex;
      align-items: flex-end;
      padding: 10px 12px 10px;
      gap: 8px;
    }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 300;
      line-height: 1.5;
      resize: none;
      max-height: 140px;
      min-height: 24px;
      padding: 3px 0;
    }
    #user-input::placeholder { color: var(--text-dim); }

    .icon-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      width: 34px; height: 34px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .icon-btn:hover { background: var(--surface2); color: var(--text); }
    .icon-btn svg { width: 18px; height: 18px; }

    #send-btn {
      width: 34px; height: 34px;
      background: var(--user-bg);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
      box-shadow: 0 0 12px rgba(124,58,237,0.4);
    }
    #send-btn:hover { opacity: 0.85; transform: scale(1.05); }
    #send-btn:disabled { background: var(--surface2); box-shadow: none; cursor: not-allowed; opacity: 0.5; }
    #send-btn svg { width: 16px; height: 16px; color: #fff; }

    #file-input { display: none; }

    /* Error */
    .error-msg { color: #f87171; font-size: 13px; }

    /* Footer note */
    .footer-note {
      text-align: center;
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 8px;
      max-width: 780px;
      margin-left: auto;
      margin-right: auto;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .welcome h1 { font-size: 24px; }
      .bubble { font-size: 14px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-mark">N</div>
  <span class="brand">NovaMind</span>
  <div class="status-pill">
    <div class="status-dot"></div>
    Онлайн
  </div>
</header>

<div id="messages">
  <div class="welcome" id="welcome">
    <div class="welcome-logo">N</div>
    <h1>Привет, я NovaMind</h1>
    <p>AI-ассистент нового поколения. Задай любой вопрос, загрузи изображение для анализа или попроси нарисовать картинку.</p>
    <div class="chips">
      <div class="chip" onclick="setPrompt('Напиши короткое стихотворение про нейросети')">✍️ Написать стихотворение</div>
      <div class="chip" onclick="setPrompt('Нарисуй закат над горами в стиле аниме')">🎨 Нарисовать картинку</div>
      <div class="chip" onclick="setPrompt('Объясни что такое квантовые вычисления простыми словами')">🔬 Объяснить тему</div>
      <div class="chip" onclick="setPrompt('Придумай названия для стартапа по доставке еды')">💡 Идеи для бизнеса</div>
    </div>
  </div>
</div>

<div class="input-shell">
  <div class="input-box">
    <div id="img-preview-strip">
      <img id="img-thumb" src="" alt="" />
      <button class="remove-img" onclick="removeImage()">×</button>
    </div>
    <div class="input-row">
      <label for="file-input" class="icon-btn" title="Прикрепить изображение">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
      </label>
      <input type="file" id="file-input" accept="image/*" />
      <textarea id="user-input" placeholder="Напиши сообщение..." rows="1"></textarea>
      <button id="send-btn" onclick="sendMessage()" title="Отправить">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/></svg>
      </button>
    </div>
  </div>
  <div class="footer-note">NovaMind может ошибаться. Проверяйте важную информацию.</div>
</div>

<script>
  // ========== НАСТРОЙКИ (только здесь меняй имя и приветствие) ==========
  const BRAND = "NovaMind";
  const SYSTEM_PROMPT = `Ты ${BRAND} — продвинутый AI-ассистент. 
Ты помогаешь с любыми задачами: отвечаешь на вопросы, пишешь тексты, анализируешь изображения, помогаешь с кодом и творческими задачами.
Ты НЕ называешь себя Claude, НЕ упоминаешь Anthropic или любых других разработчиков — ты просто ${BRAND}.
Отвечай на языке пользователя. Будь умным, дружелюбным и полезным.
Если пользователь просит нарисовать/сгенерировать изображение — скажи "Генерирую изображение..." и дай описание что нарисуешь. Система автоматически создаст картинку.`;
  // =====================================================================

  let history = [];
  let pendingImage = null;

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const fileInput = document.getElementById('file-input');
  const previewStrip = document.getElementById('img-preview-strip');
  const imgThumb = document.getElementById('img-thumb');
  const welcome = document.getElementById('welcome');

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
  });

  // Send on Enter (Shift+Enter = new line)
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  // Image attach
  fileInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      pendingImage = ev.target.result;
      imgThumb.src = pendingImage;
      previewStrip.classList.add('has-image');
    };
    reader.readAsDataURL(file);
  });

  function removeImage() {
    pendingImage = null;
    imgThumb.src = '';
    previewStrip.classList.remove('has-image');
    fileInput.value = '';
  }

  function setPrompt(text) {
    inputEl.value = text;
    inputEl.focus();
    inputEl.style.height = 'auto';
    inputEl.style.height = inputEl.scrollHeight + 'px';
  }

  // Check if user wants image generation
  function wantsImage(text) {
    const keywords = ['нарисуй', 'нарисуйте', 'сгенерируй', 'сгенерируйте', 'создай изображение', 'создай картинку',
      'draw', 'generate image', 'create image', 'paint', 'покажи картинку', 'изобрази'];
    const lower = text.toLowerCase();
    return keywords.some(k => lower.includes(k));
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text && !pendingImage) return;
    if (sendBtn.disabled) return;

    // Hide welcome
    if (welcome) welcome.style.display = 'none';

    // Add user message
    const userContent = [];
    if (pendingImage) {
      const base64 = pendingImage.split(',')[1];
      const mimeType = pendingImage.split(';')[0].split(':')[1];
      userContent.push({ type: 'image', source: { type: 'base64', media_type: mimeType, data: base64 } });
    }
    if (text) userContent.push({ type: 'text', text });

    addUserBubble(text, pendingImage);

    // Clear input
    inputEl.value = '';
    inputEl.style.height = 'auto';
    const imageForRequest = pendingImage;
    removeImage();
    sendBtn.disabled = true;

    history.push({ role: 'user', content: userContent.length === 1 && !pendingImage ? text : userContent });

    // Show typing
    const typingRow = addTyping();

    try {
      // Call backend
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history, system: SYSTEM_PROMPT })
      });

      if (!res.ok) throw new Error('Server error ' + res.status);
      const data = await res.json();

      typingRow.remove();
      const reply = data.content?.[0]?.text || 'Не удалось получить ответ.';
      history.push({ role: 'assistant', content: reply });

      // Check if we should generate an image
      const shouldGenImg = wantsImage(text) && !imageForRequest;

      if (shouldGenImg) {
        // Generate image via our API
        addAiBubble(reply, null, true);
        const imgTyping = addTyping();
        try {
          const imgRes = await fetch('/api/generate-image', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt: text })
          });
          imgTyping.remove();
          if (imgRes.ok) {
            const imgData = await imgRes.json();
            addGeneratedImage(imgData.url);
          }
        } catch(e) {
          imgTyping.remove();
          // Image generation not available, just show text reply
        }
      } else {
        addAiBubble(reply);
      }

    } catch (err) {
      typingRow.remove();
      addAiBubble('Произошла ошибка подключения. Проверь интернет и попробуй снова.', true);
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  function addUserBubble(text, imgSrc) {
    const row = document.createElement('div');
    row.className = 'msg-row user';

    const av = document.createElement('div');
    av.className = 'avatar human';
    av.textContent = 'Вы';

    const bub = document.createElement('div');
    bub.className = 'bubble';

    if (imgSrc) {
      const img = document.createElement('img');
      img.src = imgSrc;
      bub.appendChild(img);
    }
    if (text) {
      const t = document.createElement('span');
      t.textContent = text;
      bub.appendChild(t);
    }

    row.appendChild(av);
    row.appendChild(bub);
    messagesEl.appendChild(row);
    scroll();
  }

  function addAiBubble(text, isError) {
    const row = document.createElement('div');
    row.className = 'msg-row ai';

    const av = document.createElement('div');
    av.className = 'avatar ai';
    av.textContent = 'N';

    const bub = document.createElement('div');
    bub.className = 'bubble' + (isError ? ' error-msg' : '');
    bub.textContent = text;

    row.appendChild(av);
    row.appendChild(bub);
    messagesEl.appendChild(row);
    scroll();
    return row;
  }

  function addGeneratedImage(url) {
    // Find last ai bubble and append image
    const bubbles = messagesEl.querySelectorAll('.msg-row.ai .bubble');
    const lastBubble = bubbles[bubbles.length - 1];
    if (lastBubble) {
      const wrap = document.createElement('div');
      wrap.className = 'gen-image-wrap';
      const img = document.createElement('img');
      img.src = url;
      img.alt = 'Сгенерированное изображение';
      img.onload = () => scroll();
      wrap.appendChild(img);
      lastBubble.appendChild(wrap);
    }
  }

  function addTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row ai';
    const av = document.createElement('div');
    av.className = 'avatar ai';
    av.textContent = 'N';
    const bub = document.createElement('div');
    bub.className = 'typing-bubble';
    bub.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
    row.appendChild(av);
    row.appendChild(bub);
    messagesEl.appendChild(row);
    scroll();
    return row;
  }

  function scroll() {
    messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' });
  }
</script>
</body>
</html>
